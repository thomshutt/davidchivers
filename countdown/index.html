<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tom, You Need To Write</title>
  <style>
    :root {
      color-scheme: light;
      --desktop: #008080;
      --window: #c0c0c0;
      --border-light: #ffffff;
      --border-dark: #808080;
      --border-deep: #000000;
      --title-start: #000080;
      --title-end: #1084d0;
      --text: #111111;
      --field: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--desktop);
      color: var(--text);
      font-family: "MS Sans Serif", Tahoma, Geneva, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.1) 0,
        rgba(255, 255, 255, 0.1) 1px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0) 4px
      );
      opacity: 0.12;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0) 55%, rgba(0, 0, 0, 0.22) 100%);
    }

    .window {
      width: min(560px, 100%);
      background: var(--window);
      border-top: 2px solid var(--border-light);
      border-left: 2px solid var(--border-light);
      border-right: 2px solid var(--border-deep);
      border-bottom: 2px solid var(--border-deep);
      box-shadow:
        2px 2px 0 rgba(0, 0, 0, 0.25),
        0 0 24px rgba(255, 255, 255, 0.15);
      position: relative;
    }

    .window::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0) 24%);
    }

    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 6px;
      background: linear-gradient(90deg, var(--title-start), var(--title-end));
      color: #ffffff;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .title-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title-buttons {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .title-button {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      background: var(--window);
      color: #000000;
      font-size: 0.7rem;
      line-height: 1;
      border-top: 2px solid var(--border-light);
      border-left: 2px solid var(--border-light);
      border-right: 2px solid var(--border-dark);
      border-bottom: 2px solid var(--border-dark);
    }

    .window-body {
      padding: 18px;
    }

    .result {
      margin: 0 0 18px;
      padding: 18px 16px;
      background: var(--field);
      border-top: 2px solid var(--border-dark);
      border-left: 2px solid var(--border-dark);
      border-right: 2px solid var(--border-light);
      border-bottom: 2px solid var(--border-light);
      font-size: clamp(1.45rem, 4vw, 2rem);
      font-weight: 700;
      line-height: 1.2;
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.88rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 9px 10px;
      font: inherit;
      color: var(--text);
      background: var(--field);
      border-top: 2px solid var(--border-dark);
      border-left: 2px solid var(--border-dark);
      border-right: 2px solid var(--border-light);
      border-bottom: 2px solid var(--border-light);
    }

    .hint {
      margin: 16px 0 0;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>
  <main class="window" aria-label="Tom writing tracker">
    <div class="title-bar">
      <div class="title-text">Tom, You Need To Write</div>
      <div class="title-buttons" aria-hidden="true">
        <div class="title-button">_</div>
        <div class="title-button">&#9633;</div>
        <div class="title-button">X</div>
      </div>
    </div>

    <div class="window-body">
      <p class="result" id="words-left-text">You have 40,000 words left.</p>

      <div class="controls">
        <div class="field">
          <label for="goal-words">Goal</label>
          <input id="goal-words" type="number" min="1" step="100" value="40000" inputmode="numeric">
        </div>

        <div class="field">
          <label for="words-written">Words written so far</label>
          <input id="words-written" type="number" min="0" step="1" value="0" inputmode="numeric">
        </div>
      </div>

      <p class="hint">The goal is editable and this page remembers both numbers in this browser.</p>
    </div>
  </main>

  <script>
    const DEFAULT_GOAL_WORDS = 40000;
    const GOAL_STORAGE_KEY = "tom-countdown-goal-words";
    const WRITTEN_STORAGE_KEY = "tom-countdown-words-written";

    const goalInput = document.getElementById("goal-words");
    const wordsInput = document.getElementById("words-written");
    const wordsLeftText = document.getElementById("words-left-text");

    function clampGoal(value) {
      if (!Number.isFinite(value)) {
        return DEFAULT_GOAL_WORDS;
      }

      return Math.max(1, Math.min(1000000, Math.round(value)));
    }

    function clampWords(value, goalWords) {
      if (!Number.isFinite(value)) {
        return 0;
      }

      return Math.max(0, Math.min(goalWords, Math.round(value)));
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("en-GB").format(value);
    }

    function update() {
      const goalWords = clampGoal(Number(goalInput.value));
      const wordsWritten = clampWords(Number(wordsInput.value), goalWords);
      const wordsLeft = Math.max(0, goalWords - wordsWritten);

      goalInput.value = goalWords;
      wordsInput.value = wordsWritten;
      wordsInput.max = String(goalWords);
      wordsLeftText.textContent = `You have ${formatNumber(wordsLeft)} words left.`;
    }

    function handleInput() {
      update();
      localStorage.setItem(GOAL_STORAGE_KEY, goalInput.value);
      localStorage.setItem(WRITTEN_STORAGE_KEY, wordsInput.value);
    }

    const savedGoal = Number(localStorage.getItem(GOAL_STORAGE_KEY));
    if (Number.isFinite(savedGoal)) {
      goalInput.value = clampGoal(savedGoal);
    }

    const savedWords = Number(localStorage.getItem(WRITTEN_STORAGE_KEY));
    if (Number.isFinite(savedWords)) {
      wordsInput.value = clampWords(savedWords, clampGoal(Number(goalInput.value)));
    }

    goalInput.addEventListener("input", handleInput);
    wordsInput.addEventListener("input", handleInput);
    update();
  </script>
</body>
</html>
