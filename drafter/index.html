function closeModal() { modalOverlay.classList.remove('open'); editingId = null; }
function saveModal() {
  const cat = fCategory.value.trim(), sub = fSubcategory.value.trim(), title = fTitle.value.trim(), text = fReplyText.value.trim(), kw = fKeywords.value.trim();
  if (!cat || !title || !text) { showToast('Please fill in category, title, and reply text'); return; }
  if (editingId) {
    const response = allResponses.find(item => item.id === editingId);
    if (response) {
      response.category = cat;
      response.subcategory = sub || 'General';
      response.title = title;
      response.replyText = text;
      response.keywords = kw;
      response.image = pendingImage || null;
    }
    markDirty('Updated locally - click Save to website to share it');
  }
  else {
    allResponses.push({
      id: DataService.nextId(),
      category: cat,
      subcategory: sub || 'General',
      title,
      replyText: text,
      keywords: kw,
      image: pendingImage || null,
      active: true,
      sortOrder: allResponses.filter(r => r.category === cat).reduce((m, r) => Math.max(m, r.sortOrder || 0), 0) + 1
    });
    markDirty('Added locally - click Save to website to share it');
  }
  closeModal();
  render();
}

// ── Events: sidebar ──
sidebar.addEventListener('click', e => {
  const t = e.target;
  // Quick copy from sidebar leaf
  const lc = t.closest('.leaf-copy');
  if (lc) {
    const r = allResponses.find(x=>x.id===lc.dataset.copyid);
    if (!r) return;
    const plain = r.replyText.replace(/<a\s[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/g,'$2 ($1)').replace(/<[^>]+>/g,'');
    const html = r.replyText.replace(/\n/g,'<br>') + (r.image ? '<br><img src="'+r.image+'">' : '');
    const onOk = ()=>{lc.classList.add('copied');lc.textContent='\u2713';setTimeout(()=>{lc.classList.remove('copied');lc.textContent='copy';},1200);};
    try {
      navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html],{type:'text/html'}),'text/plain':new Blob([plain],{type:'text/plain'})})]).then(onOk).catch(()=>navigator.clipboard.writeText(plain).then(onOk));
    } catch(e) { navigator.clipboard.writeText(plain).then(onOk).catch(()=>showToast('Copy failed')); }
    return;
  }
  // Expand/collapse arrow
  const tog = t.closest('[data-toggle]');
  if (tog) { const c=tog.dataset.toggle; expandedCats.has(c)?expandedCats.delete(c):expandedCats.add(c); render(); return; }
  // All
  if (t.closest('[data-filter="all"]')) { if(!showDeleted){filter={type:'all',category:null,subcategory:null};render();} return; }
  // Click on a response leaf — scroll to it in cards
  const leaf = t.closest('.response-leaf');
  if (leaf && !t.closest('.leaf-copy')) {
    const rid = leaf.dataset.id;
    const r = allResponses.find(x=>x.id===rid);
    if (r) { filter={type:'category',category:r.category,subcategory:null}; render(); setTimeout(()=>{const card=cardsPanel.querySelector('[data-cardid="'+rid+'"]');if(card){card.scrollIntoView({behavior:'smooth',block:'center'});card.classList.add('highlight');setTimeout(()=>card.classList.remove('highlight'),1500);}},50); }
    return;
  }
  // Category click
  const cat = t.closest('[data-filter="category"]');
  if (cat) { const c=cat.dataset.cat; filter={type:'category',category:c,subcategory:null}; if(!expandedCats.has(c))expandedCats.add(c); render(); }
});

// ── Events: search ──
searchBox.addEventListener('input', () => { searchQuery = searchBox.value.trim(); buildCards(); });

// ── Events: cards ──
cardsPanel.addEventListener('click', e => {
  const cp = e.target.closest('.copy-btn');
  if (cp) {
    const r=allResponses.find(x=>x.id===cp.dataset.id); if(!r)return;
    const plain=r.replyText.replace(/<a\s[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/g,'$2 ($1)').replace(/<[^>]+>/g,'');
    const html=r.replyText.replace(/\n/g,'<br>') + (r.image ? '<br><img src="'+r.image+'">' : '');
    try {
      const blob = new Blob([html], {type:'text/html'});
      const plainBlob = new Blob([plain], {type:'text/plain'});
      navigator.clipboard.write([new ClipboardItem({'text/html':blob,'text/plain':plainBlob})]).then(()=>{cp.textContent='Copied!';cp.classList.add('copied');setTimeout(()=>{cp.textContent='Copy';cp.classList.remove('copied');},1500);}).catch(()=>{navigator.clipboard.writeText(plain).then(()=>{cp.textContent='Copied!';cp.classList.add('copied');setTimeout(()=>{cp.textContent='Copy';cp.classList.remove('copied');},1500);});});
    } catch(e) { navigator.clipboard.writeText(plain).then(()=>{cp.textContent='Copied!';cp.classList.add('copied');setTimeout(()=>{cp.textContent='Copy';cp.classList.remove('copied');},1500);}).catch(()=>showToast('Copy failed')); }
    return;
  }
  const ed = e.target.closest('.edit-btn');
  if (ed) { const r=allResponses.find(x=>x.id===ed.dataset.id); if(r)openModal(r); return; }
  const del = e.target.closest('.delete-btn');
  if (del) {
    const r = allResponses.find(x => x.id === del.dataset.id);
    if (r && confirm('Delete "' + r.title + '"?\n\nYou can restore it from "Recently deleted" if needed.')) {
      allResponses = allResponses.filter(x => x.id !== r.id);
      r.active = false;
      r._deletedAt = new Date().toISOString();
      deleted.push(r);
      markDirty('Deleted locally - click Save to website to share it');
      render();
    }
    return;
  }
  const res = e.target.closest('.restore-btn');
  if (res) {
    const r = deleted.find(x => x.id === res.dataset.id);
    if (r) {
      deleted = deleted.filter(x => x.id !== r.id);
      r.active = true;
      r._deletedAt = null;
      allResponses.push(r);
      markDirty('Restored locally - click Save to website to share it');
      render();
    }
    return;
  }
  if (e.target.id==='addResponseBtn') { openModal(null); return; }
  const tgl = e.target.closest('.card-toggle');
  if (tgl) { const tx=tgl.closest('.card').querySelector('.card-text'); if(tgl.dataset.state==='collapsed'){tx.classList.remove('collapsed');tgl.textContent='Show less';tgl.dataset.state='expanded';}else{tx.classList.add('collapsed');tgl.textContent='Show full text';tgl.dataset.state='collapsed';} }
});

// ── Events: edit mode ──
editToggle.addEventListener('click', () => {
  if (!editMode && !isEditorUnlocked() && !requestEditorUnlock()) return;
  editMode = !editMode;
  showDeleted = false;
  editToggle.classList.toggle('active', editMode);
  editToolbar.classList.toggle('show', editMode);
  updateSaveButton();
  render();
});
deletedLink.addEventListener('click', () => { showDeleted=!showDeleted; filter={type:'all',category:null,subcategory:null}; render(); });
refreshBtn.addEventListener('click', async () => {
  if (!confirmDiscardChanges('reload the latest shared version')) return;
  await loadLatestResponses();
});
saveWebsiteBtn.addEventListener('click', saveResponsesToWebsite);

// ── Events: modal ──
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalSave').addEventListener('click', saveModal);
modalOverlay.addEventListener('click', e => { if(e.target===modalOverlay)closeModal(); });

// ── Events: image upload ──
imgUploadArea.addEventListener('click', e => { if(!e.target.closest('.img-remove-btn')) imgFileInput.click(); });
imgFileInput.addEventListener('change', async () => { if(imgFileInput.files[0]){setModalImage(await compressImage(imgFileInput.files[0]));} imgFileInput.value=''; });
imgRemoveBtn.addEventListener('click', e => { e.stopPropagation(); clearModalImage(); });
imgUploadArea.addEventListener('dragover', e => { e.preventDefault(); imgUploadArea.classList.add('dragover'); });
imgUploadArea.addEventListener('dragleave', () => { imgUploadArea.classList.remove('dragover'); });
imgUploadArea.addEventListener('drop', async e => { e.preventDefault(); imgUploadArea.classList.remove('dragover'); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/'))setModalImage(await compressImage(f)); });
// Paste image anywhere in modal
modalOverlay.addEventListener('paste', async e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      setModalImage(await compressImage(item.getAsFile()));
      return;
    }
  }
});

// ── Events: export/import/reset ──
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(serializeResponses(), null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='email_drafter_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  showToast('Backup downloaded');
});
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e => {
  const f=e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=()=>{try{
    const d=JSON.parse(reader.result);
    if(!Array.isArray(d))throw 0;
    if(!confirm('Load '+d.length+' responses from this file?\n\nThis will replace your current browser copy until you save again. Use "Download backup" first if you want to keep what you have.'))return;
    applyResponses(d);
    markDirty('Loaded backup locally - click Save to website to share it');
    render();
  }catch(err){showToast('Could not read that file \u2014 please check it is a valid backup');}};
  reader.readAsText(f); e.target.value='';
});
document.getElementById('resetBtn').addEventListener('click', () => {
  const resetSource = sourceResponses.length ? sourceResponses : DEFAULT_RESPONSES;
  if(!confirm('Restore the last loaded shared version?\n\nThis will discard any browser-only edits that have not been saved to the website yet.'))return;
  applyResponses(resetSource, { clearUnsaved: true });
  render();
  showToast('Restored ' + lastLoadedFrom);
});

// ── Init ──
window.addEventListener('beforeunload', event => {
  if (!hasUnsavedChanges) return;
  event.preventDefault();
  event.returnValue = '';
});

(async function init() {
  applyResponses(DEFAULT_RESPONSES, { rememberSource: true, clearUnsaved: true });
  render();
  updateSaveButton();
  await loadLatestResponses({ silent: true });
})();
</script>
</body>
</html>
